<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
  <style>
    body {
  background: black;
  color: cyan;
  font-family: 'Orbitron';
  text-align: center;
  padding-top: 100px;
}

button {
  background: cyan;
  color: black;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
}
  </style>
<body>

<h1>Welcome 👋</h1>
<p id="userEmail">Loading...</p>

<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHLyiX6AvIjEr-hkaBGKg_kEf78Xskd48",
  authDomain: "southeast-studios.firebaseapp.com",
  projectId: "southeast-studios",
  storageBucket: "southeast-studios.firebasestorage.app",
  messagingSenderId: "977801049293",
  appId: "1:977801049293:web:911d9d0986a025d113e584"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const userEmail = document.getElementById("userEmail");

// WAIT for Firebase
onAuthStateChanged(auth, (user) => {
  if (user) {
    userEmail.innerText = user.email;
  } else {
    console.log("No user found");
    window.location.href = "login.html";
  }
});

window.logout = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};
</script>
</body>
</html>
